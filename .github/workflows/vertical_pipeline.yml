name: Crustdata Vertical Cache Refresh

on:
  # Run weekly on Monday at 2am EST (7am UTC)
  schedule:
    - cron: '0 7 * * 1'
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      vertical_index:
        description: 'Vertical index (0-9), leave blank to refresh all'
        required: false
        default: ''

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Crustdata refresh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          VERTICAL_INDEX: ${{ github.event.inputs.vertical_index }}
        run: python vertical_crustdata_refresh.py 
