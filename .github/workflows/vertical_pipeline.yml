name: Vertical Pipeline

on:
  schedule:
    # Daily at 8am EST (1pm UTC) — rotates through verticals by day of year
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      vertical_index:
        description: 'Vertical index (0-9), leave blank for day-of-year rotation'
        required: false
        default: ''

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anthropic requests gspread google-auth feedparser
      - name: Run vertical pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          VERTICAL_INDEX: ${{ github.event.inputs.vertical_index }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: python vertical_pipeline.py
